<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pievienot recepti</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Pievienot recepti</h1>
        <nav>
            <ul>
                <li><a href="index.html">Sākums</a></li>
                <li><a href="recipes.html">Receptes</a></li>
                <li><a href="add-recipe.html">Pievienot recepti</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Ievadiet jauno recepti</h2>
        <form action="submit-recipe.php" method="post">
            <label for="recipe-name">Receptes nosaukums:</label>
            <input type="text" id="recipe-name" name="recipe-name" required>

            <label for="recipe-description">Apraksts:</label>
            <textarea id="recipe-description" name="recipe-description" rows="4" required></textarea>

            <label for="recipe-ingredients">Sastāvdaļas:</label>
            <textarea id="recipe-ingredients" name="recipe-ingredients" rows="4" required></textarea>

            <label for="recipe-steps">Pagatavošanas soļi:</label>
            <textarea id="recipe-steps" name="recipe-steps" rows="4" required></textarea>

            <button type="submit">Pievienot recepti</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 RecepteWeb - Visas tiesības aizsargātas.</p>
    </footer>

</body>
</html>
